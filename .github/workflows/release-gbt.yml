name: Release GBT Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-gbt-desktop.yml
    secrets: inherit

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: gbt-desktop-x86_64-pc-windows-msvc
          path: dl/x86_64-pc-windows-msvc

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: gbt-desktop-aarch64-apple-darwin
          path: dl/aarch64-apple-darwin

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: gbt-desktop-x86_64-apple-darwin
          path: dl/x86_64-apple-darwin

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: gbt-desktop-x86_64-unknown-linux-gnu
          path: dl/x86_64-unknown-linux-gnu

      - name: Collect and rename release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          mkdir -p release-assets

          # Windows: NSIS setup + MSI
          if [ -d "dl/x86_64-pc-windows-msvc" ]; then
            find "dl/x86_64-pc-windows-msvc" -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.sig' \) | while read -r f; do
              base=$(basename "$f")
              case "$base" in
                gbt-app_*_x64-setup.exe)        new="gbt-app_${VERSION}_x64-setup.exe" ;;
                gbt-app_*_x64-setup.exe.sig)    new="gbt-app_${VERSION}_x64-setup.exe.sig" ;;
                gbt-app_*_x64_en-US.msi)        new="gbt-app_${VERSION}_x64_en-US.msi" ;;
                gbt-app_*_x64_en-US.msi.sig)    new="gbt-app_${VERSION}_x64_en-US.msi.sig" ;;
                *)                              new="$base" ;;
              esac
              cp "$f" "release-assets/$new"
            done
          fi

          # macOS arm64
          if [ -d "dl/aarch64-apple-darwin" ]; then
            find "dl/aarch64-apple-darwin" -type f \( -name '*.dmg' -o -name '*.app' -o -name '*.tar.gz' -o -name '*.sig' \) | while read -r f; do
              base=$(basename "$f")
              if [[ "$base" == *.app.tar.gz.sig ]]; then
                new="gbt-app_${VERSION}_aarch64-apple-darwin.app.tar.gz.sig"
              elif [[ "$base" == *.app.tar.gz ]]; then
                new="gbt-app_${VERSION}_aarch64-apple-darwin.app.tar.gz"
              elif [[ "$base" == *.dmg ]]; then
                new="gbt-app_${VERSION}_aarch64-apple-darwin.dmg"
              elif [[ "$base" == *.dmg.sig ]]; then
                new="gbt-app_${VERSION}_aarch64-apple-darwin.dmg.sig"
              elif [[ "$base" == *.app ]]; then
                new="gbt-app_${VERSION}_aarch64-apple-darwin.app"
              else
                ext="${base##*.}"
                new="gbt-app_${VERSION}_aarch64-apple-darwin.${ext}"
              fi
              cp "$f" "release-assets/$new"
            done
          fi

          # macOS x64
          if [ -d "dl/x86_64-apple-darwin" ]; then
            find "dl/x86_64-apple-darwin" -type f \( -name '*.dmg' -o -name '*.app' -o -name '*.tar.gz' -o -name '*.sig' \) | while read -r f; do
              base=$(basename "$f")
              if [[ "$base" == *.app.tar.gz.sig ]]; then
                new="gbt-app_${VERSION}_x86_64-apple-darwin.app.tar.gz.sig"
              elif [[ "$base" == *.app.tar.gz ]]; then
                new="gbt-app_${VERSION}_x86_64-apple-darwin.app.tar.gz"
              elif [[ "$base" == *.dmg ]]; then
                new="gbt-app_${VERSION}_x86_64-apple-darwin.dmg"
              elif [[ "$base" == *.dmg.sig ]]; then
                new="gbt-app_${VERSION}_x86_64-apple-darwin.dmg.sig"
              elif [[ "$base" == *.app ]]; then
                new="gbt-app_${VERSION}_x86_64-apple-darwin.app"
              else
                ext="${base##*.}"
                new="gbt-app_${VERSION}_x86_64-apple-darwin.${ext}"
              fi
              cp "$f" "release-assets/$new"
            done
          fi

          # Linux: DEB + AppImage
          if [ -d "dl/x86_64-unknown-linux-gnu" ]; then
            find "dl/x86_64-unknown-linux-gnu" -type f \( -name '*.deb' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.sig' \) | while read -r f; do
              base=$(basename "$f")
              if [[ "$base" == *.AppImage ]]; then
                new="gbt-app_${VERSION}_x86_64-unknown-linux-gnu.AppImage"
              elif [[ "$base" == *.AppImage.sig ]]; then
                new="gbt-app_${VERSION}_x86_64-unknown-linux-gnu.AppImage.sig"
              elif [[ "$base" == *.deb ]]; then
                new="gbt-app_${VERSION}_x86_64-unknown-linux-gnu.deb"
              elif [[ "$base" == *.deb.sig ]]; then
                new="gbt-app_${VERSION}_x86_64-unknown-linux-gnu.deb.sig"
              else
                ext="${base##*.}"
                new="gbt-app_${VERSION}_x86_64-unknown-linux-gnu.${ext}"
              fi
              cp "$f" "release-assets/$new"
            done
          fi

          ls -la release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate Tauri updater manifest
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          export PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export RELEASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          python3 - <<'PY'
          import os, json, glob
          version = os.environ['VERSION']
          pub_date = os.environ['PUB_DATE']
          base = os.environ['RELEASE_URL']
          assets = glob.glob('release-assets/*')

          def read_sig(path):
              if path and os.path.exists(path):
                  with open(path, 'r') as f:
                      return f.read().strip()
              return None

          def asset(name):
              return f"{base}/{name}"

          platforms = {}

          win_setup = f"gbt-app_{version}_x64-setup.exe"
          win_setup_sig = read_sig(f"release-assets/{win_setup}.sig")
          if win_setup_sig:
              platforms['windows-x86_64'] = {"signature": win_setup_sig, "url": asset(win_setup)}

          darwin_arm = f"gbt-app_{version}_aarch64-apple-darwin.app.tar.gz"
          darwin_arm_sig = read_sig(f"release-assets/{darwin_arm}.sig")
          if darwin_arm_sig:
              platforms['darwin-aarch64'] = {"signature": darwin_arm_sig, "url": asset(darwin_arm)}

          darwin_x64 = f"gbt-app_{version}_x86_64-apple-darwin.app.tar.gz"
          darwin_x64_sig = read_sig(f"release-assets/{darwin_x64}.sig")
          if darwin_x64_sig:
              platforms['darwin-x86_64'] = {"signature": darwin_x64_sig, "url": asset(darwin_x64)}

          linux_app = f"gbt-app_{version}_x86_64-unknown-linux-gnu.AppImage"
          linux_app_sig = read_sig(f"release-assets/{linux_app}.sig")
          if linux_app_sig:
              platforms['linux-x86_64'] = {"signature": linux_app_sig, "url": asset(linux_app)}

          manifest = {
              "version": f"v{version}",
              "notes": "See full release notes on GitHub",
              "pub_date": pub_date,
              "platforms": platforms,
          }

          with open('release-assets/latest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
