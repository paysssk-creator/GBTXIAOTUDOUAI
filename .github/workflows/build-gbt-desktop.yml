name: Build GBT Desktop

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false
      sign-macos:
        type: boolean
        default: false
        description: 'Sign macOS bundles with Apple certificates (requires APPLE_* secrets)'
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
      sign-macos:
        type: boolean
        default: false
        description: 'Sign macOS bundles with Apple certificates (requires APPLE_* secrets)'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.platform }}
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf portaudio19-dev libportaudio2

      - name: Install system dependencies (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install portaudio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pefile

      - name: Build GBT sidecar
        shell: bash
        run: |
          python scripts/tauri/build-gbt-sidecar.py
          bash scripts/tauri/stage-gbt-sidecar.sh ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing is opt-in; unsigned builds avoid breaking CI when APPLE_CERTIFICATE
          # is missing or invalid. Set sign-macos=true and configure APPLE_* secrets to sign.
          APPLE_CERTIFICATE: ${{ inputs.sign-macos == true && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ inputs.sign-macos == true && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ inputs.sign-macos == true && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ inputs.sign-macos == true && secrets.APPLE_ID || '' }}
          APPLE_TEAM_ID: ${{ inputs.sign-macos == true && secrets.APPLE_TEAM_ID || '' }}
          APPLE_PASSWORD: ${{ inputs.sign-macos == true && secrets.APPLE_PASSWORD || '' }}
        run: |
          pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbt-desktop-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
