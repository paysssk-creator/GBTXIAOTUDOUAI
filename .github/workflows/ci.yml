name: GBT CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run skill standalone tests
        run: |
          python -m gbt.skills.system_status
          python -m gbt.skills.screenpipe_monitor status
          python -m gbt.skills.cradle_task "open chrome"
      - name: Build Windows EXE
        run: python build_exe.py
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GBTWorkstation
          path: dist/GBTWorkstation/

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Test container health
        if: github.event_name != 'release'
        run: |
          docker run -d --name gbt-ci -p 8765:8765 gbt-ai-workstation:latest
          sleep 15
          curl -f http://127.0.0.1:8765/api/health || exit 1
          docker stop gbt-ci && docker rm gbt-ci
