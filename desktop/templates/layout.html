<script>
var A='/api',D=document;
var w={min:function(){try{window.pywebview.api.min()}catch(e){}},max:function(){try{window.pywebview.api.max()}catch(e){}},close:function(){try{window.pywebview.api.close()}catch(e){window.close()}}};
var RM='CHAIN',ST={},pnOpen=true;
var $=function(id){return D.getElementById(id)};
var esc=function(t){var e=D.createElement('span');e.textContent=t;return e.innerHTML};
var tfmt=function(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};

function togglePanel(){
  pnOpen=!pnOpen;
  if(pnOpen){$('pn').classList.add('open');$('pt').classList.add('on');$('card').classList.add('narrow')}
  else{$('pn').classList.remove('open');$('pt').classList.remove('on');$('card').classList.remove('narrow')}
}
function go(v,btn){
  D.querySelectorAll('.ni').forEach(function(b){b.classList.remove('active')});if(btn)btn.classList.add('active');
  $('wc').style.display=(v==='chat'||v==='reason')?'none':'flex';
  $('cv').style.display=v==='chat'?'flex':'none';
  $('rv').style.display=v==='reason'?'flex':'none';
  $('tv').style.display=v==='trade'?'flex':'none';
  if(v==='chat')setTimeout(function(){$('ci').focus()},50);
  else if(v==='reason')setTimeout(function(){$('ri').focus()},50);
}
function setMode(m,btn){RM=m;D.querySelectorAll('.mp').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
function qchat(t){go('chat',D.querySelector('[data-v=chat]'));$('ci').value=t;chat()}
function toast(t){var d=D.createElement('div');d.className='toast';d.textContent=t;D.body.appendChild(d);setTimeout(function(){d.remove()},2800)}

function addMsg(role,txt,cid){
  var c=$(cid||'ml'),g=D.createElement('div');g.className='mg';var u=role==='user';
  g.innerHTML='<div class="av '+(u?'u':'a')+'">'+(u?'<i class="ph ph-user"></i>':'<i class="ph ph-sparkle"></i>')+'</div>'+
    '<div class="mb"><div class="mh"><span class="mauth">'+(u?'你':'GBT')+'</span><span class="mtime">'+tfmt()+'</span></div>'+
    '<div class="mc">'+esc(txt)+'</div></div>';
  c.appendChild(g);c.scrollTop=c.scrollHeight;return g;
}

function chat(){
  var t=$('ci').value.trim();if(!t)return;$('ci').value='';
  $('wc').style.display='none';addMsg('user',t);var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  fetch(A+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})})
  .then(function(r){return r.json()}).then(function(r){g.querySelector('.mc').classList.remove('thinking');g.querySelector('.mc').textContent=r.response||r.error})
  .catch(function(e){g.querySelector('.mc').classList.remove('thinking');g.querySelector('.mc').innerHTML='<span style="color:var(--red)">错误: '+esc(e.message)+'</span>'});
}

function reason(){
  var t=$('ri').value.trim();if(!t)return;$('ri').value='';
  var h=$('rl'),w=h.querySelector('.welcome');if(w)w.style.display='none';
  addMsg('user','['+RM+'] '+t,'rl');var g=addMsg('ai','','rl');g.querySelector('.mc').classList.add('thinking');
  fetch(A+'/reason',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,mode:RM})})
  .then(function(r){return r.json()}).then(function(r){g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').innerHTML='<div class="rc"><div class="rmt"><span class="rb">'+(r.mode||RM)+
      '</span><span>'+(r.steps||0)+' 步</span><span>置信度: '+Math.round((r.confidence||0)*100)+'%</span></div>'+
      '<div class="rbo">'+esc(r.conclusion||'无结论')+'</div></div>';h.scrollTop=h.scrollHeight})
  .catch(function(e){g.querySelector('.mc').classList.remove('thinking');g.querySelector('.mc').innerHTML='<span style="color:var(--red)">错误: '+esc(e.message)+'</span>'});
}

function switchProv(){
  var p=$('ms').value;if(!p)return;
  var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  fetch(A+'/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:p})})
  .then(function(r){return r.json()}).then(function(j){g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').textContent=j.name?('已切换至 '+j.name+' ('+j.model+')'):'切换失败'});
}

function mcp(s){
  go('chat',D.querySelector('[data-v=chat]'));
  var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  fetch(A+'/mcp/'+s,{method:'POST'}).then(function(r){return r.json()}).then(function(r){g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').innerHTML='<b>['+s+']</b> '+(r.ok?'<span style="color:var(--green)">成功</span>':'<span style="color:var(--red)">失败</span>')+(r.data?'<br><small style="color:var(--t3)">'+(r.data||'').substring(0,300)+'</small>':'')});
}

function evo(){
  go('chat',D.querySelector('[data-v=chat]'));
  var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  fetch(A+'/evolve',{method:'POST'}).then(function(r){return r.json()}).then(function(r){g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').textContent=r.ok?('进化成功\n'+r.summary+'\n步骤: '+r.steps):'进化失败'});
}

// ── 守夜人 ──
var _WT={running:false,alerts:[],autoFix:true};

function wtDot(s){
  var cls='idle';if(s==='ok')cls='ok';else if(s==='warn')cls='warn';else if(s==='error')cls='err';
  return '<span class="wt-dot '+cls+'"></span>';
}

function wtLevel(l){if(l==='critical')return'crit';if(l==='warn')return'warn';return'info'}

async function loadWatcher(){
  try{
    var r=await fetch(A+'/watcher/status'),d=await r.json();
    _WT.running=d.running;
    var h='<div class="wt-header">';
    h+='<span class="wt-badge '+(d.running?'on':'off')+'">'+(d.running?'运行中':'已停止')+'</span>';
    h+='<span style="font-size:10px;color:var(--t4)">自动修复: '+(d.auto_fix?'开':'关')+'</span>';
    h+='</div>';

    // 监控网格
    if(d.monitors){
      var order=['network','process','filesystem','wifi','registry','disk','logs'];
      var labels={network:'网络',process:'进程',filesystem:'文件',wifi:'WiFi',registry:'注册表',disk:'磁盘',logs:'日志'};
      h+='<div class="wt-grid">';
      order.forEach(function(k){
        var m=d.monitors[k]||{status:'idle'};
        h+='<div class="wt-item" title="'+(m.details||'')+'">'+wtDot(m.status)+labels[k]+'</div>';
      });
      h+='</div>';
    }

    // 最近告警
    if(d.recent_alerts&&d.recent_alerts.length){
      h+='<div style="margin-top:6px;font-size:10px;color:var(--t4);font-weight:600">最近告警</div>';
      d.recent_alerts.slice(0,5).forEach(function(a){
        h+='<div class="wt-alert '+wtLevel(a.level)+(a.fixed?' fixed':'')+'" title="'+(a.message||'')+'">';
        h+='<div class="wa-h"><span class="wa-src">'+a.source+'</span><span style="font-size:9px;color:var(--t4)">'+a.time+'</span></div>';
        h+='<div class="wa-msg">'+esc(a.message||'').substring(0,60)+'</div>';
        if(a.fixed)h+='<div class="wa-fix">✅ 已自动修复</div>';
        h+='</div>';
      });
    }

    // 按钮
    h+='<div class="wt-btn-row">';
    if(d.running){
      h+='<button class="wt-btn stop" onclick="wtStop()">⏹ 停止</button>';
    }else{
      h+='<button class="wt-btn start" onclick="wtStart()">▶ 启动</button>';
    }
    h+='<button class="wt-btn scan" onclick="wtScan()">🔍 扫描</button>';
    h+='</div>';

    $('wt').innerHTML=h;
  }catch(e){$('wt').innerHTML='<span style="color:var(--t4);font-size:10px">守夜人离线</span>'}
}

async function wtStart(){
  try{
    var r=await fetch(A+'/watcher/start',{method:'POST'}),d=await r.json();
    if(d.ok)toast('🛡️ 守夜人已启动 — '+d.monitors+'个监控点');
    loadWatcher();
  }catch(e){toast('启动失败: '+e.message)}
}

async function wtStop(){
  try{
    var r=await fetch(A+'/watcher/stop',{method:'POST'}),d=await r.json();
    toast('守夜人已停止');
    loadWatcher();
  }catch(e){}
}

async function wtScan(){
  toast('🛡️ 正在扫描...');
  try{
    var r=await fetch(A+'/watcher/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:'all'})}),
        d=await r.json();
    go('chat',D.querySelector('[data-v=chat]'));
    var g=addMsg('ai','');g.querySelector('.mc').innerHTML='<b>🛡️ 守夜人扫描结果</b>';
    for(var k in d){
      var v=d[k];g.querySelector('.mc').innerHTML+='<div style="margin:4px 0;font-size:12px"><b>'+k+':</b> '+(v.ok?'<span style="color:var(--green)">正常</span>':'<span style="color:var(--red)">异常</span>')+' — '+esc(v.output||'')+'</div>';
    }
    loadWatcher();
  }catch(e){}
}

// ── 面板数据 ──
var _CONN=null;

async function _getConns(){
  if(_CONN)return _CONN;
  try{var r=await fetch(A+'/connectors'),d=await r.json();_CONN=d.connectors||[];return _CONN}catch(e){return[]}
}

function _cDot(s){return s==='connected'?'<span class="cp-dot on"></span>':'<span class="cp-dot"></span>'}

async function loadAI(){
  try{
    var items=[
      {id:'chat',icon:'ph-chat-circle-dots',name:'LLM 对话',desc:'智能问答',act:'go',arg:'chat'},
      {id:'reason',icon:'ph-brain',name:'深度推理',desc:'CoT/树形/SWOT/根因',act:'go',arg:'reason'},
      {id:'scanner',icon:'ph-scan',name:'代码扫描',desc:'代码分析',act:'mcp',arg:'scanner'},
      {id:'audit',icon:'ph-shield-check',name:'安全审计',desc:'全面评估',act:'mcp',arg:'audit'},
      {id:'auto-fix',icon:'ph-wrench',name:'自动修复',desc:'漏洞修补',act:'mcp',arg:'auto-fix'},
      {id:'evolve',icon:'ph-arrows-clockwise',name:'自我进化',desc:'自进化',act:'evolve'},
      {id:'websearch',icon:'ph-globe',name:'网页搜索',desc:'实时搜索',act:'webSearch'}
    ];
    var h='<div class="cp-list">';
    items.forEach(function(it){
      h+='<div class="cp-item" onclick="aiAction(\''+it.id+'\',\''+it.act+'\',\''+it.arg+'\')" title="'+it.desc+'">';
      h+='<i class="ph '+it.icon+' cp-icon ai"></i>';
      h+='<span class="cp-name">'+it.name+'</span>';
      h+='<span class="cp-sub">'+it.desc+'</span>';
      h+='</div>';
    });
    h+='</div>';
    $('ai').innerHTML=h;
  }catch(e){$('ai').innerHTML='<span class="cp-err">-</span>'}
}

async function loadControl(){
  try{
    var items=[
      {id:'filesystem',icon:'ph-folder-open',name:'文件系统',tools:'读写搜索'},
      {id:'terminal',icon:'ph-terminal-window',name:'终端',tools:'命令执行'},
      {id:'process',icon:'ph-cpu',name:'进程管理',tools:'列表/终止'},
      {id:'registry',icon:'ph-database',name:'注册表',tools:'读写'},
      {id:'git',icon:'ph-git-branch',name:'Git',tools:'状态/日志'},
      {id:'display',icon:'ph-monitor',name:'显示',tools:'截图'}
    ];
    var h='<div class="cp-list">';
    items.forEach(function(it){
      var c=_CONN?_CONN.filter(function(x){return x.id===it.id})[0]:null;
      var st=c?c.status:'off';
      h+='<div class="cp-item" onclick="cnAction(\''+it.id+'\',\'toggle\')" title="'+it.tools+'">';
      h+=_cDot(st);
      h+='<i class="ph '+it.icon+' cp-icon ctrl"></i>';
      h+='<span class="cp-name">'+it.name+'</span>';
      h+='<span class="cp-sub">'+it.tools+'</span>';
      h+='</div>';
    });
    h+='</div>';
    $('ctrl').innerHTML=h;
  }catch(e){$('ctrl').innerHTML='<span class="cp-err">-</span>'}
}

async function loadHack(){
  try{
    var items=[
      {id:'scanner',icon:'ph-scan',name:'漏洞扫描',desc:'漏洞检测',level:'high'},
      {id:'audit',icon:'ph-shield-check',name:'安全审计',desc:'全面评估',level:'high'},
      {id:'auto-fix',icon:'ph-wrench',name:'自动修复',desc:'自动打补丁',level:'mid'},
      {id:'network',icon:'ph-radar',name:'网络安全',desc:'Ping/DNS/Trace',level:'mid'},
      {id:'wifi',icon:'ph-wifi-high',name:'WiFi扫描',desc:'信号扫描',level:'low'}
    ];
    var h='<div class="cp-list">';
    items.forEach(function(it){
      var act=(it.id==='network'||it.id==='wifi')?'netTool':'mcp';
      h+='<div class="cp-item hack-'+it.level+'" onclick="cnAction(\''+it.id+'\',\''+act+'\')" title="'+it.desc+'">';
      h+='<i class="ph '+it.icon+' cp-icon hack"></i>';
      h+='<span class="cp-name">'+it.name+'</span>';
      h+='<span class="cp-sub">'+it.desc+'</span>';
      h+='</div>';
    });
    h+='</div>';
    $('hack').innerHTML=h;
  }catch(e){$('hack').innerHTML='<span class="cp-err">-</span>'}
}

function cnAction(id,act){
  if(act==='mcp'){mcp(id);return}
  if(act==='netTool'){netTool(id);return}
  if(act==='toggle'){
    var c=_CONN?_CONN.filter(function(x){return x.id===id})[0]:null;
    if(!c)return;
    cnToggle(id,c.status)
  }
}

async function loadConnectors(){
  try{var cs=await _getConns();var on=cs.filter(function(c){return c.status==='connected'}).length;
    var off=cs.filter(function(c){return c.status==='disconnected'}).length;
    var h='<div class="cn-summary">';
    h+='<div class="cn-stat"><span class="cn-num on">'+on+'</span> 活跃</div>';
    h+='<div class="cn-stat"><span class="cn-num">'+off+'</span> 离线</div>';
    h+='</div>';
    h+='<div class="cn-quick">';
    var cats={code:'代码',device:'设备',data:'数据',security:'安全',communication:'通信'};
    for(var cat in cats){
      var items=cs.filter(function(c){return c.category===cat});
      var act=items.filter(function(c){return c.status==='connected'}).length;
      h+='<div class="cn-cat-row">'+cats[cat]+': '+act+'/'+items.length+'</div>';
    }
    h+='</div>';
    $('cn').innerHTML=h;
  }catch(e){$('cn').innerHTML='离线'}
}

function cnToggle(id,status){
  var ep=status==='connected'?'disconnect':'connect';
  fetch(A+'/connectors/'+id+'/'+ep,{method:'POST'}).then(function(r){return r.json()}).then(function(j){
    toast(j.ok?('成功: '+j.status):(j.error||'失败'));
    _CONN=null;loadControl();loadConnectors();
  });
}

async function loadMarket(){
  try{var r=await fetch(A+'/market'),d=await r.json(),mk=$('mk');
    if(!d.updated||!d.indices.length){mk.innerHTML='<span style="color:var(--t4);font-size:11px">休市中</span>';return}
    var h='';d.indices.forEach(function(i){
      var dir=i.change>=0?'mk-up':'mk-dn',arr=i.change>=0?'+':'';
      h+='<div class="mkr"><span class="mkn">'+i.name+'</span><span class="mkp '+dir+'">'+i.price.toFixed(2)+'</span><span class="mkc '+dir+'">'+arr+i.changePct+'%</span></div>';
    });
    mk.innerHTML=h;
  }catch(e){}
}

async function loadSystem(){
  try{var r=await fetch(A+'/system'),d=await r.json(),sy=$('sy');
    var h='<div class="sys-r"><div class="sr"><span>CPU</span><span class="sv">'+d.cpu.toFixed(1)+'%</span></div><div class="sbar"><div class="sf sf-cpu" style="width:'+d.cpu+'%"></div></div></div>';
    h+='<div class="sys-r"><div class="sr"><span>内存 '+d.memory_used_gb+'/'+d.memory_total_gb+' GB</span><span class="sv">'+d.memory+'%</span></div><div class="sbar"><div class="sf sf-mem" style="width:'+d.memory+'%"></div></div></div>';
    sy.innerHTML=h;
    try{var rd=await fetch(A+'/devices'),dd=await rd.json();
      if(dd.disk_c&&dd.disk_c.total_gb){
        var du=dd.disk_c,pct=Math.round(du.used_gb/du.total_gb*100);
        sy.innerHTML+='<div class="sys-r"><div class="sr"><span>C盘 '+du.used_gb+'/'+du.total_gb+' GB</span><span class="sv">'+pct+'%</span></div><div class="sbar"><div class="sf sf-disk" style="width:'+pct+'%"></div></div></div>';
      }
    }catch(e){}
  }catch(e){}
}

async function loadDevices(){
  try{var r=await fetch(A+'/devices'),d=await r.json(),dv=$('dv'),h='';
    if(d.gpu&&d.gpu.length){d.gpu.forEach(function(g){h+='<div class="dv-item"><div class="dv-n"><span class="dv-d"></span> '+g.name+'</div><div class="dv-i">'+(g.ram_mb?'显存 '+g.ram_mb+' MB':'')+'</div></div>'})}
    if(d.audio&&d.audio.length){var ac=d.audio.filter(function(a){return a.status==='OK'}).length;h+='<div class="dv-item"><div class="dv-n"><span class="dv-d"></span> 音频设备</div><div class="dv-i">'+ac+'/'+d.audio.length+' 设备</div></div>'}
    dv.innerHTML=h||'无设备数据';
  }catch(e){}
}

async function loadProviders(){
  try{var r=await fetch(A+'/providers');ST.p=await r.json();var s=$('ms'),ll=$('ll');s.innerHTML='';var h='';
  for(var k in ST.p){var v=ST.p[k],on=v.status==='available';
    s.innerHTML+='<option value="'+k+'"'+(on?'':' disabled')+'>'+(on?'可用 ':'-- ')+v.name+'</option>';
    var dots=on?'<span style="color:var(--green)">可用</span>':'<span style="color:var(--t4)">不可用</span>';
    h+=dots+' '+v.name+'<br>';
  }
  ll.innerHTML=h||'无可用引擎';
}catch(e){}}

function aiAction(id,act,arg){
  if(act==='go'){go(id,D.querySelector('[data-v='+id+']'));return}
  if(act==='mcp'){mcp(arg);return}
  if(act==='evolve'){runEvolve();return}
  if(act==='webSearch'){runWebSearch();return}
}

function runEvolve(){
  go('chat',D.querySelector('[data-v=chat]'));
  var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  g.querySelector('.mc').innerHTML='<b>正在运行自我进化...</b>';
  fetch(A+'/evolve',{method:'POST'}).then(function(r){return r.json()}).then(function(j){
    g.querySelector('.mc').classList.remove('thinking');
    var c=j.ok?'#52c41a':'#ff4d4f';
    g.querySelector('.mc').innerHTML='<div style="font-weight:600;color:'+c+'">'+(j.ok?'进化成功':'进化失败')+'</div>'
      +'<p style="margin:4px 0;color:var(--t2)">摘要: '+(j.summary||'无')+'</p>'
      +'<p style="margin:0;color:var(--t4)">步骤: '+(j.steps||0)+' | 回滚: '+(j.rollback||'否')+'</p>';
  }).catch(function(e){
    g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').innerHTML='<span style="color:var(--red)">错误: '+esc(e.message)+'</span>';
  });
}

function runWebSearch(){
  var q=prompt('搜索关键词:');
  if(!q||!q.trim())return;
  go('chat',D.querySelector('[data-v=chat]'));
  var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  g.querySelector('.mc').innerHTML='<b>搜索中: '+esc(q)+'...</b>';
  fetch(A+'/websearch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})})
  .then(function(r){return r.json()}).then(function(j){
    g.querySelector('.mc').classList.remove('thinking');
    if(j.ok){
      var h='<div><b style="color:var(--cyan)">搜索结果: '+esc(q)+'</b></div>';
      h+='<div style="max-height:400px;overflow-y:auto;margin-top:8px">';
      (j.results||[]).forEach(function(r){h+='<div style="margin:6px 0;padding:6px;background:var(--bg2);border-radius:6px"><a href="'+r.url+'" target="_blank" style="color:var(--cyan)">'+r.title+'</a><br><small style="color:var(--t3)">'+r.snippet+'</small></div>'});
      h+='</div>';
      g.querySelector('.mc').innerHTML=h;
    }else{
      g.querySelector('.mc').innerHTML='<span style="color:var(--red)">'+j.error+'</span>';
    }
  }).catch(function(e){
    g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').innerHTML='<span style="color:var(--red)">错误: '+esc(e.message)+'</span>';
  });
}

function netTool(id){
  go('chat',D.querySelector('[data-v=chat]'));
  var g=addMsg('ai','');g.querySelector('.mc').classList.add('thinking');
  var labels={network:'网络诊断',wifi:'WiFi扫描'};
  g.querySelector('.mc').innerHTML='<b>正在运行 '+labels[id]+'...</b>';
  var ep=id==='wifi'?'wifi-scan':'network-ping';
  fetch(A+'/'+ep,{method:'POST'}).then(function(r){return r.json()}).then(function(j){
    g.querySelector('.mc').classList.remove('thinking');
    if(j.ok){
      var h='<div style="font-weight:600;color:var(--green)">'+labels[id]+' 结果</div>';
      h+='<pre style="margin:8px 0;padding:10px;background:var(--bg2);border-radius:6px;font-size:11px;max-height:300px;overflow:auto;white-space:pre-wrap">'+esc(j.output||'')+'</pre>';
      g.querySelector('.mc').innerHTML=h;
    }else{
      g.querySelector('.mc').innerHTML='<span style="color:var(--red)">'+j.error+'</span>';
    }
  }).catch(function(e){
    g.querySelector('.mc').classList.remove('thinking');
    g.querySelector('.mc').innerHTML='<span style="color:var(--red)">错误: '+esc(e.message)+'</span>';
  });
}

async function init(){
  $('pn').classList.remove('closed');$('pt').classList.add('on');$('card').classList.add('narrow');
  try{var r=await fetch(A+'/status');ST=await r.json();
    $('stx').textContent=ST.llm+' '+ST.model;$('sd').classList.add('on');
  }catch(e){$('stx').textContent='离线'}
  await _getConns();
  await Promise.all([loadAI(),loadControl(),loadHack(),loadConnectors(),loadWatcher(),loadTrader()]);
  loadProviders();
  loadMarket();
  loadSystem();
  loadDevices();
  setInterval(function(){loadSystem();loadDevices();loadWatcher()},5000);
  setInterval(loadMarket,30000);
  // 加载操盘手状态
  try{var tr=await fetch(A+'/trader/status'),td=await tr.json();
    if(td.auto_trade){var b=$('tAutoBtn');b.style.background='var(--green)';b.innerHTML='▶ 自主交易:开'}
  }catch(e){}
}

D.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='1'){e.preventDefault();go('chat',D.querySelector('[data-v=chat]'))}
  if(e.ctrlKey&&e.key==='2'){e.preventDefault();go('reason',D.querySelector('[data-v=reason]'))}
  if(e.ctrlKey&&e.key==='3'){e.preventDefault();go('trade',D.querySelector('[data-v=trade]'))}
});

// ── A股操盘 JS ──
var _TR={autoTrade:false};

function _tAdd(html){
  var h=$('tl'),w=h.querySelector('.welcome');if(w)w.style.display='none';
  var g=D.createElement('div');g.className='mg';
  g.innerHTML='<div class="av a"><i class="ph ph-chart-line-up"></i></div><div class="mb"><div class="mh"><span class="mauth">操盘手</span><span class="mtime">'+tfmt()+'</span></div><div class="mc">'+html+'</div></div>';
  h.appendChild(g);h.scrollTop=h.scrollHeight;return g;
}

async function traderScan(){
  go('trade',D.querySelector('[data-v=trade]'));
  var g=_tAdd('<b>🔍 AI正在扫描全市场...</b>');g.querySelector('.mc').classList.add('thinking');
  try{
    var r=await fetch(A+'/trader/scan',{method:'POST'}),d=await r.json();
    g.querySelector('.mc').classList.remove('thinking');
    if(!d.signals||!d.signals.length){g.querySelector('.mc').innerHTML='<b>📊 扫描完成</b><p style="color:var(--t4)">暂无显著交易信号</p>';return}
    var buy=d.signals.filter(function(s){return s.action==='buy'});
    var sell=d.signals.filter(function(s){return s.action==='sell'});
    var h='<div><b style="color:var(--cyan)">📊 AI扫描结果</b> ';
    h+='<span style="color:var(--green)">买入信号:'+buy.length+'</span> ';
    h+='<span style="color:var(--red)">卖出信号:'+sell.length+'</span></div>';
    h+='<div style="max-height:400px;overflow-y:auto;margin-top:8px">';
    d.signals.slice(0,15).forEach(function(s){
      var clr=s.action==='buy'?'var(--green)':s.action==='sell'?'var(--red)':'var(--t3)';
      var emoji=s.action==='buy'?'📈':s.action==='sell'?'📉':'➖';
      h+='<div style="margin:4px 0;padding:6px 8px;background:var(--bg2);border-radius:6px;border-left:3px solid '+clr+'">';
      h+='<div style="display:flex;justify-content:space-between"><b>'+s.name+'</b><span style="color:'+clr+';font-weight:700">'+emoji+' '+s.action.toUpperCase()+'</span></div>';
      h+='<div style="font-size:11px;color:var(--t3)">'+s.code+' | ¥'+s.price+' | 置信度:'+s.confidence+'%</div>';
      h+='<div style="font-size:11px;color:var(--t4)">策略:'+(s.strategy||'N/A')+' | '+(s.reason||'').substring(0,60)+'</div>';
      h+='</div>';
    });
    h+='</div>';
    g.querySelector('.mc').innerHTML=h;
  }catch(e){g.querySelector('.mc').classList.remove('thinking');g.querySelector('.mc').innerHTML='<span style="color:var(--red)">扫描异常: '+esc(e.message)+'</span>'}
}

async function traderAnalyze(){
  var code=$('tcode').value.trim();if(!code){toast('请输入股票代码');return}
  go('trade',D.querySelector('[data-v=trade]'));
  // 显示实时行情
  try{
    var qr=await fetch(A+'/trader/quotes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codes:[code]})});
    var qd=await qr.json();
    if(qd.quotes&&qd.quotes[code]){
      var q=qd.quotes[code],dir=q.change>=0?'var(--green)':'var(--red)',arr=q.change>=0?'+':'';
      $('tquote').style.display='block';
      $('tquote').innerHTML='<b>'+q.name+'</b> ¥'+q.price+' <span style="color:'+dir+'">'+arr+q.change+' ('+arr+q.change_pct+'%)</span> | 最高'+q.high+' 最低'+q.low+' | 成交额'+q.amount+'万';
    }
  }catch(e){}
  // AI分析
  var g=_tAdd('<b>🤖 AI分析 '+code+'...</b>');g.querySelector('.mc').classList.add('thinking');
  try{
    var r=await fetch(A+'/trader/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})});
    var d=await r.json();g.querySelector('.mc').classList.remove('thinking');
    if(!d.ok){g.querySelector('.mc').innerHTML='<span style="color:var(--red)">'+d.error+'</span>';return}
    var s=d.signal,clr=s.action==='buy'?'var(--green)':s.action==='sell'?'var(--red)':'var(--t3)';
    var emoji=s.action==='buy'?'📈 买入':s.action==='sell'?'📉 卖出':'➖ 观望';
    var h='<div style="border-left:3px solid '+clr+';padding-left:10px">';
    h+='<div style="font-weight:700;color:'+clr+'">'+emoji+' | '+s.name+'('+s.code+')</div>';
    h+='<div style="margin:4px 0">💰 现价: ¥'+s.price+' | 置信度: '+s.confidence+'%</div>';
    h+='<div style="color:var(--t2)">📋 分析: '+esc(s.reason||'N/A')+'</div>';
    h+='<div style="color:var(--t4)">🎯 策略: '+(s.strategy||'N/A')+'</div></div>';
    g.querySelector('.mc').innerHTML=h;
  }catch(e){g.querySelector('.mc').classList.remove('thinking');g.querySelector('.mc').innerHTML='<span style="color:var(--red)">分析异常: '+esc(e.message)+'</span>'}
}

async function traderOpen(platform){
  go('trade',D.querySelector('[data-v=trade]'));
  var g=_tAdd('<b>🌐 正在打开 '+platform+'...</b>');
  try{
    var r=await fetch(A+'/trader/platform',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform:platform})});
    var d=await r.json();
    g.querySelector('.mc').innerHTML=d.ok?('<b style="color:var(--green)">✅ 已打开 '+platform+'</b><br><small style="color:var(--t4)">'+d.url+'</small>'):('<span style="color:var(--red)">打开失败: '+d.error+'</span>');
  }catch(e){g.querySelector('.mc').innerHTML='<span style="color:var(--red)">错误: '+esc(e.message)+'</span>'}
}

async function traderAutoToggle(){
  _TR.autoTrade=!_TR.autoTrade;
  var b=$('tAutoBtn');
  try{
    var r=await fetch(A+'/trader/autotrade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:_TR.autoTrade})});
    var d=await r.json();
    if(_TR.autoTrade){b.style.background='var(--green)';b.innerHTML='▶ 自主交易:开';toast('自主交易已开启 — AI将直接执行买卖!')}
    else{b.style.background='var(--red)';b.innerHTML='⏸ 自主交易:关';toast('自主交易已关闭')}
  }catch(e){}
}

async function loadTrader(){
  try{
    var r=await fetch(A+'/trader/status'),d=await r.json();
    _TR.autoTrade=d.auto_trade;
    var b=$('tAutoBtn');
    if(_TR.autoTrade){b.style.background='var(--green)';b.innerHTML='▶ 自主交易:开'}
  }catch(e){}
}

init();
</script>
