<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

<div id="tb">
  <div class="logo"><div class="g">G</div><span>GBT Pro</span></div>
  <div class="btns">
    <button class="tb-btn" onclick="win.min()"><i class="ph ph-minus"></i></button>
    <button class="tb-btn" onclick="win.max()"><i class="ph ph-square"></i></button>
    <button class="tb-btn cl" onclick="win.close()"><i class="ph ph-x"></i></button>
  </div>
</div>

<div id="app">
  <nav id="sb">
    <div class="sb-head">
      <div class="sb-id">
        <div class="sb-av">G</div>
        <div><h2>GBT Pro</h2><div class="ver">DeepSeek v4-pro</div></div>
      </div>
    </div>
    <div class="sb-nav">
      <button class="ni active" data-view="chat" onclick="go('chat',this)"><i class="ph ph-chat-circle-dots"></i><span>Chat</span><span class="kb">^1</span></button>
      <button class="ni" data-view="reason" onclick="go('reason',this)"><i class="ph ph-brain"></i><span>Deep Reason</span><span class="kb">^2</span></button>
      <div class="sb-sep"></div>
      <div class="sb-label">Tools</div>
      <button class="ni" onclick="run('scanner')"><i class="ph ph-scan"></i><span>Code Scanner</span></button>
      <button class="ni" onclick="run('audit')"><i class="ph ph-shield-check"></i><span>Security Audit</span></button>
      <button class="ni" onclick="run('auto-fix')"><i class="ph ph-wrench"></i><span>Auto Fix</span></button>
      <button class="ni" onclick="ev()"><i class="ph ph-arrows-clockwise"></i><span>6-Step Evolve</span></button>
    </div>
    <div class="sb-foot">
      <div class="st-row"><span class="sb-dot" id="sd"></span><span id="stx">Connecting</span></div>
    </div>
  </nav>

  <div id="mn">
    <!-- Market ticker (floating) -->
    <div class="mkt-ticker" id="mk"></div>
    <!-- Status bar (floating) -->
    <div class="status-bar"><div class="stat-item"><span class="stat-dot cpu"></span><span id="cv2">—</span></div><div class="stat-item"><span class="stat-dot mem"></span><span id="rv">—</span></div><div class="stat-item"><span class="stat-dot key"></span><span id="kv">—</span></div></div>

    <!-- Main Card -->
    <div class="card">
      <!-- Badge bar -->
      <div class="badge-bar">
        <button class="plus-badge" onclick="go('reason',D.querySelector('[data-view=reason]'))"><i class="ph ph-sparkle"></i> Deep Reasoning</button>
        <button class="ia-btn" onclick="go('reason',D.querySelector('[data-view=reason]'))"><i class="ph ph-sidebar-simple"></i></button>
      </div>

      <!-- Chat View -->
      <div class="chat-area" id="cv">
        <div class="welcome" id="wc">
          <h1>我们该做什么？</h1>
          <p>Powered by <b>DeepSeek v4-pro</b><br>19 MCP services · 代码分析 · 深度推理 · 安全扫描 · 自动修复</p>
          <div class="quick-suggestions" style="width:100%">
            <div class="qs-label">快速开始</div>
            <button class="qs-row" onclick="qt('Analyze my project structure')"><i class="ph ph-folder-open"></i> 排查项目结构<span class="qs-arrow"><i class="ph ph-arrow-right"></i></span></button>
            <button class="qs-row" onclick="qt('Scan for security vulnerabilities')"><i class="ph ph-shield"></i> 安全漏洞扫描<span class="qs-arrow"><i class="ph ph-arrow-right"></i></span></button>
            <button class="qs-row" onclick="qt('Help me plan the implementation')"><i class="ph ph-git-branch"></i> 规划实施方案<span class="qs-arrow"><i class="ph ph-arrow-right"></i></span></button>
            <button class="qs-row" onclick="run('audit')"><i class="ph ph-squares-four"></i> 将常用工具连接到 GBT<span class="qs-arrow"><i class="ph ph-arrow-right"></i></span></button>
          </div>
        </div>
        <div class="msg-list" id="ml"></div>
        <div class="input-area">
          <div class="input-card">
            <textarea id="ci" placeholder="随心输入…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ch()}"></textarea>
            <div class="input-actions">
              <div class="ia-left">
                <button class="ia-btn"><i class="ph ph-paperclip"></i></button>
              </div>
              <div class="ia-right">
                <select class="model-select" id="ms" onchange="sp()"><option>DeepSeek v4-pro</option></select>
                <button class="send-btn" onclick="ch()"><i class="ph ph-arrow-up"></i></button>
              </div>
            </div>
          </div>
          <div class="footer-hint"><i class="ph ph-folder"></i> 进入项目工作</div>
        </div>
      </div>

      <!-- Reason View -->
      <div class="chat-area" id="rv" style="display:none">
        <div class="rh">
          <h3>Deep Reasoning Engine</h3>
          <div class="sub">Step-by-step logical decomposition for complex decisions</div>
          <div class="mps">
            <button class="mp active" data-mode="CHAIN" onclick="sm('CHAIN',this)"><i class="ph ph-arrow-line-right"></i> CoT</button>
            <button class="mp" data-mode="TREE" onclick="sm('TREE',this)"><i class="ph ph-tree-structure"></i> Tree</button>
            <button class="mp" data-mode="SWOT" onclick="sm('SWOT',this)"><i class="ph ph-compass"></i> SWOT</button>
            <button class="mp" data-mode="ROOT_CAUSE" onclick="sm('ROOT_CAUSE',this)"><i class="ph ph-question"></i> 5-Why</button>
          </div>
        </div>
        <div class="msg-list" id="rl">
          <div class="welcome"><h1 style="font-size:24px">深度推理</h1><p>输入复杂问题——引擎将逐步拆解分析</p></div>
        </div>
        <div class="input-area">
          <div class="input-card">
            <textarea id="ri" placeholder="提出推理问题…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();rs()}"></textarea>
            <div class="input-actions">
              <div class="ia-left"></div>
              <div class="ia-right">
                <button class="send-btn" onclick="rs()"><i class="ph ph-arrow-up"></i></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var A='/api',D=document,win=function(){};
var RM='CHAIN',st={};
var $=function(id){return D.getElementById(id)};
var es=function(t){var e=D.createElement('span');e.textContent=t;return e.innerHTML};
var ts=function(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})};

function go(v,btn){
  D.querySelectorAll('.ni').forEach(function(b){b.classList.remove('active')});
  if(btn)btn.classList.add('active');
  $('cv').style.display=v==='chat'?'flex':'none';
  $('rv').style.display=v==='reason'?'flex':'none';
  (v==='reason'?$('ri'):$('ci')).focus();
}
function sm(m,btn){RM=m;D.querySelectorAll('.mp').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');}
function qt(t){$('ci').value=t;ch()}
function toast(t){var d=D.createElement('div');d.className='toast';d.textContent=t;D.body.appendChild(d);setTimeout(function(){d.remove()},3000);}
function hideW(){var w=$('wc');if(w)w.style.display='none';}

function add(role,txt,cid){
  var c=$(cid||'ml');if(!cid)hideW();
  var g=D.createElement('div');g.className='mg';
  var isU=role==='user';
  g.innerHTML='<div class="av '+(isU?'u':'a')+'">'+(isU?'<i class="ph ph-user"></i>':'<i class="ph ph-sparkle"></i>')+'</div>'+
    '<div class="mb"><div class="mh"><span class="mauth">'+(isU?'You':'GBT')+'</span><span class="mtime">'+ts()+'</span></div>'+
    '<div class="mc">'+es(txt)+'</div></div>';
  c.appendChild(g);c.scrollTop=c.scrollHeight;return g;
}

function ch(){
  var t=$('ci').value.trim();if(!t)return;$('ci').value='';
  add('user',t);var g=add('ai','');g.querySelector('.mc').classList.add('th');
  fetch(A+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})})
  .then(function(r){return r.json()}).then(function(r){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').textContent=r.response||r.error;
  }).catch(function(e){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').innerHTML='<span style="color:var(--red)">Error: '+es(e.message)+'</span>';
  });
}

function rs(){
  var t=$('ri').value.trim();if(!t)return;$('ri').value='';
  var h=$('rl'),w=h.querySelector('.welcome');if(w)w.style.display='none';
  add('user','['+RM+'] '+t,'rl');
  var g=add('ai','','rl');g.querySelector('.mc').classList.add('th');
  fetch(A+'/reason',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,mode:RM})})
  .then(function(r){return r.json()}).then(function(r){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').innerHTML='<div class="rc"><div class="rmt"><span class="rb">'+(r.mode||RM)+
      '</span><span>'+(r.steps||0)+' steps</span><span>Confidence: '+Math.round((r.confidence||0)*100)+'%</span></div>'+
      '<div class="rbo">'+es(r.conclusion||'No conclusion')+'</div></div>';
    h.scrollTop=h.scrollHeight;
  }).catch(function(e){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').innerHTML='<span style="color:var(--red)">Error: '+es(e.message)+'</span>';
  });
}

function sp(){
  var p=$('ms').value;if(!p)return;
  var g=add('ai','');g.querySelector('.mc').classList.add('th');
  fetch(A+'/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:p})})
  .then(function(r){return r.json()}).then(function(j){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').textContent=j.name?('Switched to '+j.name+' ('+j.model+')'):'Switch failed';
  });
}

function run(s){
  hideW();
  var g=add('ai','');g.querySelector('.mc').classList.add('th');
  fetch(A+'/mcp/'+s,{method:'POST'}).then(function(r){return r.json()}).then(function(r){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').innerHTML='<b>['+s+']</b> '+(r.ok?'<span style="color:var(--green)">OK</span>':'<span style="color:var(--red)">FAIL</span>')+''+(r.data?'<br><small style="color:var(--text-tertiary)">'+(r.data||'').substring(0,300)+'</small>':'');
  });
}

function ev(){hideW();var g=add('ai','');g.querySelector('.mc').classList.add('th');
  fetch(A+'/evolve',{method:'POST'}).then(function(r){return r.json()}).then(function(r){
    g.querySelector('.mc').classList.remove('th');
    g.querySelector('.mc').textContent=r.ok?('Evolve SUCCESS\n'+r.summary+'\nSteps: '+r.steps):'Evolve FAIL';
  });
}

async function init(){
  try{var r=await fetch(A+'/status');st=await r.json();
    $('stx').textContent=st.llm+' '+st.model;$('sd').classList.add('on');
    $('kv').textContent=st.keys_available+'/'+st.keys_total+' keys';
  }catch(e){$('stx').textContent='Offline';}
  await ldP();
  ldM();ldS();
  setInterval(ldS,4000);setInterval(ldM,30000);
}

async function ldP(){try{var r=await fetch(A+'/providers');st.p=await r.json();var s=$('ms');s.innerHTML='';
  for(var k in st.p){var v=st.p[k],on=v.status==='available';
    s.innerHTML+='<option value="'+k+'"'+(on?'':' disabled')+'>'+(on?'● ':'○ ')+v.name+'</option>';}
}catch(e){}}

async function ldM(){try{var r=await fetch(A+'/market');var d=await r.json();var mk=$('mk');
  if(!d.updated||!d.indices.length){mk.innerHTML='';return}
  var h='';d.indices.slice(0,3).forEach(function(i){var dir=i.change>=0?'up':'dn',arr=i.change>=0?'+':'';
    h+='<span>'+i.name.substring(0,4)+' <b class="'+dir+'">'+i.price.toFixed(0)+'</b> <span class="'+dir+'">'+arr+i.changePct+'%</span></span>';});
  mk.innerHTML=h;}catch(e){}}

async function ldS(){try{var r=await fetch(A+'/system');var d=await r.json();
  $('cv2').textContent='CPU '+d.cpu+'%';$('rv').textContent='RAM '+d.memory+'%';}catch(e){}}

D.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='1'){e.preventDefault();go('chat',D.querySelector('[data-view=chat]'));}
  if(e.ctrlKey&&e.key==='2'){e.preventDefault();go('reason',D.querySelector('[data-view=reason]'));}
});

init();
</script>
