<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GBT v2.0 - AI Desktop Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1e1e2e;--bg2:#181825;--bg3:#313244;--tx:#cdd6f4;--tx2:#6c7086;--bl:#89b4fa;--gr:#a6e3a1;--pk:#f5c2e7}
body{font-family:'Microsoft YaHei',sans-serif;background:#11111b;color:var(--tx);min-height:100vh}
.nav{background:var(--bg2);height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.nav h1{font-size:16px;color:var(--pk)}
.nav span{font-size:11px;color:var(--tx2)}
.main{display:flex;height:calc(100vh - 72px)}
.side{width:200px;background:var(--bg);padding:12px;overflow-y:auto;flex-shrink:0}
.side h3{font-size:10px;color:var(--tx2);margin:10px 0 4px;text-transform:uppercase}
.side button{display:block;width:100%;text-align:left;padding:6px 8px;margin:1px 0;background:var(--bg3);color:var(--tx);border:none;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
.side button:hover{background:#45475a;color:var(--bl)}
.chat{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:8px 16px;border-bottom:1px solid var(--bg3);display:flex;justify-content:space-between;font-size:13px}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px}
.msg{padding:7px 10px;border-radius:5px;margin-bottom:5px;max-width:80%;font-size:12px;white-space:pre-wrap;word-wrap:break-word}
.msg.user{background:var(--bg3);margin-left:auto;border-right:2px solid var(--bl)}
.msg.assistant{background:var(--bg3);border-left:2px solid var(--gr)}
.msg.welcome{background:linear-gradient(135deg,var(--pk),#cba6f7);text-align:center;color:var(--bg);font-weight:700;font-size:13px;max-width:95%;margin:10px auto;padding:12px}
.msg.system{color:var(--tx2);font-size:10px;background:transparent}
.chat-input{display:flex;padding:8px 12px;border-top:1px solid var(--bg3);gap:6px}
.chat-input textarea{flex:1;background:var(--bg3);color:var(--tx);border:none;border-radius:5px;padding:8px;resize:none;font-family:Consolas,monospace;font-size:12px;height:48px;outline:none}
.chat-input button{background:var(--bl);color:var(--bg);border:none;border-radius:5px;padding:0 14px;font-weight:700;cursor:pointer;font-family:inherit}
.footer{background:var(--bg2);height:24px;display:flex;align-items:center;padding:0 16px;font-size:9px;color:var(--tx2);justify-content:space-between}
</style>
</head>
<body>
<nav class="nav">
  <h1>GBT v2.0</h1>
  <span id="status-text">Loading...</span>
</nav>
<div class="main">
<aside class="side">
  <h3>AI</h3>
  <button onclick="quickReason('chain')">Chain Reason</button>
  <button onclick="quickReason('tree')">Tree</button>
  <button onclick="quickReason('swot')">SWOT</button>
  <button onclick="quickReason('root_cause')">Root Cause</button>
  <button onclick="quickReason('decision')">Decision</button>
  <h3>Tools</h3>
  <button onclick="callMCP('scanner')">Scanner</button>
  <button onclick="callMCP('audit')">Audit</button>
  <button onclick="callMCP('auto-fix')">Auto Fix</button>
  <button onclick="evolve()">6-Step Evolve</button>
  <button onclick="callMCP('mirror-deploy')">Mirror Deploy</button>
</aside>
<main class="chat">
  <div class="chat-header"><span>Chat</span><button onclick="clearChat()" style="background:var(--bg3);color:var(--tx2);border:none;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px">Clear</button></div>
  <div class="chat-messages" id="messages"><div class="msg welcome" id="welcome">Loading...</div></div>
  <div class="chat-input">
    <textarea id="input" placeholder="Type here... (Ctrl+Enter)" onkeydown="if(event.ctrlKey&&event.key==='Enter')send()"></textarea>
    <button onclick="send()">Send</button>
  </div>
</main>
</div>
<footer class="footer"><span>GBT v2.0 | AI Native Desktop Agent</span><span>Ctrl+Enter Send</span></footer>
<script>
var A="/api", msgs=document.getElementById("messages");
async function init(){try{
  var r=await fetch(A+"/status"), s=await r.json();
  document.getElementById("status-text").textContent="LLM:"+s.llm+" | MCP:"+s.mcp_count+" | Keys:"+s.keys_available+"/"+s.keys_total;
  document.getElementById("welcome").textContent="GBT v2.0 AI Desktop Agent\nLLM:"+s.llm+" | Model:"+s.model+" | MCP:"+s.mcp_count+" | Keys:"+s.keys_available+"/"+s.keys_total+"\nType a question or use the sidebar tools.";
}catch(e){document.getElementById("welcome").textContent="Error: "+e.message;}}
function add(role,t){var d=document.createElement("div");d.className="msg "+role;d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight}
async function send(){var t=document.getElementById("input").value.trim();if(!t)return;document.getElementById("input").value="";add("user",t);
try{var r=await fetch(A+"/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:t})});var d=await r.json();add("assistant",d.response||d.error)}catch(e){add("system","Error: "+e.message)}}
function quickReason(m){var q=prompt("Question ("+m+"):");if(!q)return;add("user","[Reason:"+m+"] "+q);fetch(A+"/reason",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:q,mode:m})}).then(function(r){return r.json()}).then(function(d){add("system","## "+d.mode+" Conf:" + Math.round(d.confidence*100)+"%\n"+d.conclusion)})}
function callMCP(s){add("system","MCP/"+s+"...");fetch(A+"/mcp/"+s,{method:"POST"}).then(function(r){return r.json()}).then(function(d){add("system",(d.ok?"OK":"FAIL")+": "+(d.data||d.error))})}
function evolve(){add("system","6-Step Evolve triggered!")}
function clearChat(){msgs.innerHTML='<div class="msg welcome">Chat cleared</div>'}
init();
</script>
</body>
</html>
